<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Thêm Sản Phẩm</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #0ea5e9;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0284c7;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 4px;
            white-space: pre-wrap;
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
        }
        .success {
            background: #dcfce7;
            color: #16a34a;
        }
    </style>
</head>
<body>
    <h1>🧪 Test API Thêm Sản Phẩm</h1>
    
    <form id="productForm">
        <div class="form-group">
            <label>Tên Sản Phẩm:</label>
            <input type="text" id="ten_san_pham" value="Laptop Dell XPS 15 Test" required>
        </div>

        <div class="form-group">
            <label>Hình Ảnh (URL):</label>
            <input type="text" id="hinh_anh" value="https://via.placeholder.com/300" required>
        </div>

        <div class="form-group">
            <label>Mô Tả:</label>
            <textarea id="mo_ta" rows="3" required>Đây là mô tả test cho laptop Dell XPS 15</textarea>
        </div>

        <div class="form-group">
            <label>Danh Mục ID:</label>
            <input type="number" id="danh_muc_id" value="1" required>
        </div>

        <div class="form-group">
            <label>Thương Hiệu ID:</label>
            <input type="number" id="thuong_hieu_id" value="1" required>
        </div>

        <div class="form-group">
            <label>Giá:</label>
            <input type="number" id="gia" value="25000000" required>
        </div>

        <div class="form-group">
            <label>Tình Trạng:</label>
            <select id="tinh_trang">
                <option value="1">Hiển thị</option>
                <option value="0">Ẩn</option>
            </select>
        </div>

        <h3>Biến thể sản phẩm (Options)</h3>

        <div class="form-group">
            <label>Cấu Hình ID:</label>
            <input type="number" id="cau_hinh_id" value="1" required>
        </div>

        <div class="form-group">
            <label>Màu Sắc ID:</label>
            <input type="number" id="mau_sac_id" value="1" required>
        </div>

        <div class="form-group">
            <label>Số Lượng:</label>
            <input type="number" id="so_luong" value="10" required>
        </div>

        <div class="form-group">
            <label>Giá Điều Chỉnh:</label>
            <input type="number" id="gia_dieu_chinh" value="0" required>
        </div>

        <button type="submit">🚀 Test Thêm Sản Phẩm</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const payload = {
                sanpham: {
                    ten_san_pham: document.getElementById('ten_san_pham').value,
                    hinh_anh: document.getElementById('hinh_anh').value,
                    mo_ta: document.getElementById('mo_ta').value,
                    danh_muc_id: parseInt(document.getElementById('danh_muc_id').value),
                    thuong_hieu_id: parseInt(document.getElementById('thuong_hieu_id').value),
                    gia: parseInt(document.getElementById('gia').value),
                    tinh_trang: parseInt(document.getElementById('tinh_trang').value)
                },
                options: [{
                    cau_hinh_id: parseInt(document.getElementById('cau_hinh_id').value),
                    mau_sac_id: parseInt(document.getElementById('mau_sac_id').value),
                    so_luong: parseInt(document.getElementById('so_luong').value),
                    hinh_anh: document.getElementById('hinh_anh').value,
                    gia_dieu_chinh: parseInt(document.getElementById('gia_dieu_chinh').value)
                }]
            };

            console.log('📤 Payload gửi đi:', payload);
            
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = '⏳ Đang gửi request...';
            resultDiv.className = '';

            axios.post('/api/admin/product/create', payload)
                .then(response => {
                    console.log('✅ Success:', response.data);
                    resultDiv.textContent = '✅ THÀNH CÔNG!\n\n' + JSON.stringify(response.data, null, 2);
                    resultDiv.className = 'success';
                })
                .catch(error => {
                    console.error('❌ Error:', error.response);
                    let errorMessage = '❌ LỖI!\n\n';
                    
                    if (error.response) {
                        errorMessage += 'Status: ' + error.response.status + '\n\n';
                        
                        if (error.response.data.errors) {
                            errorMessage += 'Validation Errors:\n';
                            Object.keys(error.response.data.errors).forEach(key => {
                                errorMessage += '- ' + key + ': ' + error.response.data.errors[key].join(', ') + '\n';
                            });
                        } else if (error.response.data.message) {
                            errorMessage += 'Message: ' + error.response.data.message + '\n';
                        } else {
                            errorMessage += JSON.stringify(error.response.data, null, 2);
                        }
                    } else {
                        errorMessage += 'Network Error: ' + error.message;
                    }
                    
                    resultDiv.textContent = errorMessage;
                    resultDiv.className = 'error';
                });
        });
    </script>
</body>
</html>
